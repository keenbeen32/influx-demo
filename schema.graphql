type Token {
  id: ID! # "{chainId}-{address}"
  chainId: Int!
  address: String! @index
  symbol: String!
  decimals: Int!
  name: String!
  priceUsd: BigDecimal! @config(precision: 30, scale: 18)
  icon: String!
  category: String!
}

type GlobalState {
  id: ID! # "global"
  marketIds: Json! # string[]
  vaultIds: Json! # string[]
  tokenIds: Json! # string[]
}

type Market {
  id: ID!
  chainId: Int!
  marketId: String!

  # MarketParams fields
  loanToken: String!
  collateralToken: String!
  oracle: String!
  irm: String!
  lltv: BigInt!

  # Market fields
  totalSupplyAssets: BigInt!
  totalSupplyShares: BigInt!
  totalBorrowAssets: BigInt!
  totalBorrowShares: BigInt!
  lastUpdate: BigInt!
  fee: BigInt!

  # AdaptiveCurveIrm fields
  rateAtTarget: BigInt!

  # APY fields (Step 2)
  borrowRatePerSecond: BigInt!
  currentBorrowApy: BigDecimal! @config(precision: 30, scale: 18)
  currentSupplyApy: BigDecimal! @config(precision: 30, scale: 18)
  currentUtilization: BigDecimal! @config(precision: 30, scale: 18)

  # Oracle price (Step 4)
  oraclePrice: BigInt!

  # Collateral tracking
  totalCollateral: BigInt!

  # PublicAllocator shared liquidity
  publicAllocatorSharedLiquidity: BigInt!

  # IRM curve data
  irmCurve: Json! # [{ utilization: number, borrowApy: number, supplyApy: number }]

  # Derived fields (Step 5)
  isIdle: Boolean!
  liquidityAssets: BigInt!

  # Reverse lookups
  positions: [Position!]! @derivedFrom(field: "market_id")
  relatedVaultConfigs: [VaultConfigItem!]! @derivedFrom(field: "market_id")
  relatedVaultSupplyQueues: [VaultSupplyQueueItem!]! @derivedFrom(field: "market_id")
  relatedVaultWithdrawQueues: [VaultWithdrawQueueItem!]! @derivedFrom(field: "market_id")
  relatedPreLiquidationContracts: [PreLiquidationContract!]! @derivedFrom(field: "market_id")
  flowCaps: [FlowCap!]! @derivedFrom(field: "market_id")
  snapshots: [MarketSnapshot!]! @derivedFrom(field: "market_id")
}

type Position {
  id: ID!
  chainId: Int!
  market_id: String! @index
  user: String!

  # Position fields
  supplyShares: BigInt!
  borrowShares: BigInt!
  collateral: BigInt!
}

type Authorization {
  id: ID!
  chainId: Int!
  authorizer: String!
  authorizee: String!
  isAuthorized: Boolean!
}

type PreLiquidationContract {
  id: ID!
  chainId: Int!
  market_id: String! @index
  address: String!

  # PreLiquidationParams fields
  preLltv: BigInt!
  preLCF1: BigInt!
  preLCF2: BigInt!
  preLIF1: BigInt!
  preLIF2: BigInt!
  preLiquidationOracle: String!
}

type Vault {
  id: ID!
  chainId: Int!
  address: String!

  # Immutables
  asset: String!
  decimalsUnderlying: Int!
  decimalsOffset: Int!

  # Storage
  totalSupply: BigInt!
  owner: String!
  pendingOwner: String!
  curator: String!
  allocators: Json!
  guardian: String!
  timelock: BigInt!
  pendingGuardian: String!
  pendingGuardianValidAt: BigInt!
  pendingTimelock: BigInt!
  pendingTimelockValidAt: BigInt!
  fee: BigInt!
  feeRecipient: String!
  skimRecipient: String!
  supplyQueueLength: Int!
  withdrawQueueLength: Int!
  lastTotalAssets: BigInt!
  lostAssets: BigInt!
  name: String!
  symbol: String!
  description: String!

  # Reverse lookups
  balances: [VaultBalance!]! @derivedFrom(field: "vault_id")
  config: [VaultConfigItem!]! @derivedFrom(field: "vault_id")
  supplyQueue: [VaultSupplyQueueItem!]! @derivedFrom(field: "vault_id")
  withdrawQueue: [VaultWithdrawQueueItem!]! @derivedFrom(field: "vault_id")
}

type VaultBalance {
  id: ID!
  chainId: Int!
  vault_id: String! @index
  user: String!
  shares: BigInt!
}

type VaultConfigItem {
  id: ID!
  chainId: Int!
  vault_id: String! @index
  market_id: String! @index

  # MarketConfig fields
  cap: BigInt!
  pendingCap: BigInt!
  pendingCapValidAt: BigInt!
  enabled: Boolean!
  removableAt: BigInt!
}

type VaultSupplyQueueItem {
  id: ID!
  chainId: Int!
  vault_id: String! @index
  ordinal: Int!
  market_id: String @index
}

type VaultWithdrawQueueItem {
  id: ID!
  chainId: Int!
  vault_id: String! @index
  ordinal: Int!
  market_id: String @index
}

type FlowCap {
  id: ID! # "{chainId}-{vaultAddress}-{marketId}"
  chainId: Int!
  vault: String! @index
  market_id: String! @index
  maxIn: BigInt!
  maxOut: BigInt!
}

type MarketSnapshot {
  id: ID! # "{chainId}-{marketId}-{blockNumber}"
  chainId: Int!
  market_id: String! @index
  blockNumber: Int! @index
  lastUpdate: BigInt! # unix timestamp from Market.lastUpdate
  totalSupplyAssets: BigInt!
  totalBorrowAssets: BigInt!
  totalCollateral: BigInt!
  borrowApy: BigDecimal! @config(precision: 30, scale: 18)
  supplyApy: BigDecimal! @config(precision: 30, scale: 18)
  utilization: BigDecimal! @config(precision: 30, scale: 18)
  rateAtTarget: BigInt!
}

type VaultSnapshot {
  id: ID! # "{chainId}-{vaultAddress}-{blockNumber}"
  chainId: Int!
  vault_id: String! @index
  blockNumber: Int! @index
  lastUpdate: BigInt! # best available timestamp proxy
  totalAssets: BigInt!
  totalSupply: BigInt!
  supplyApy: BigDecimal! @config(precision: 30, scale: 18)
}
